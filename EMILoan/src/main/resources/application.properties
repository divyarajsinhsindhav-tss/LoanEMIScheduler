spring.application.name=EMILoan
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/emi_scheduler
spring.datasource.username=postgres
spring.datasource.password=Temp@123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.jwt.secret=your-super-secret-key-change-this
app.jwt.expiration=86400000

app.scheduler.overdue-cron=0 0 1 * * *
app.scheduler.reminder-cron=0 0 9 * * *
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px;">
<table width="100%" max-width="600px" align="center" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; margin: 0 auto; border-collapse: collapse;">
    <tr>
        <td style="background-color: #ffc107; padding: 30px; text-align: center; color: #333333;">
            <h1 style="margin: 0; font-size: 24px;">Upcoming EMI Reminder</h1>
        </td>
    </tr>
    <tr>
        <td style="padding: 30px; color: #333333; line-height: 1.6;">
            <p>Hello <strong th:text="${name}">Borrower</strong>,</p>
            <p>This is a gentle reminder that your next EMI payment is approaching. Please ensure sufficient funds are available to avoid late fees.</p>

            <table width="100%" cellpadding="10" cellspacing="0" style="background-color: #fffdf5; border: 1px solid #ffeeba; border-radius: 6px; margin: 20px 0;">
                <tr>
                    <td style="border-bottom: 1px solid #ffeeba; color: #856404;"><strong>Installment No:</strong></td>
                    <td style="border-bottom: 1px solid #ffeeba; text-align: right; color: #856404;"><strong th:text="'#' + ${installmentNo}">#1</strong></td>
                </tr>
                <tr>
                    <td style="border-bottom: 1px solid #ffeeba; color: #856404;"><strong>Amount Due:</strong></td>
                    <td style="border-bottom: 1px solid #ffeeba; text-align: right; color: #856404;"><strong th:text="'₹' + ${emiAmount}">₹0.00</strong></td>
                </tr>
                <tr>
                    <td style="color: #856404;"><strong>Due Date:</strong></td>
                    <td style="text-align: right; color: #856404;"><strong th:text="${dueDate}">YYYY-MM-DD</strong></td>
                </tr>
            </table>

            <div style="text-align: center; margin: 30px 0;">
                <a href="#" style="background-color: #003366; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">Pay Now</a>
            </div>
        </td>
    </tr>
</table>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px;">
<table width="100%" max-width="600px" align="center" style="background-color: #ffffff; border-radius: 8px; border-top: 5px solid #17a2b8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; margin: 0 auto; border-collapse: collapse;">
    <tr>
        <td style="padding: 30px; color: #333333; line-height: 1.6;">
            <h2 style="color: #17a2b8; margin-top: 0;">🔒 New Login Detected</h2>
            <p>Hello <strong th:text="${name}">User</strong>,</p>
            <p>We detected a new login to your EMILoan account. Here are the details of this session:</p>

            <table width="100%" cellpadding="10" cellspacing="0" style="background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; margin: 20px 0;">
                <tr>
                    <td style="border-bottom: 1px solid #e9ecef; color: #495057;"><strong>Time of Login:</strong></td>
                    <td style="border-bottom: 1px solid #e9ecef; text-align: right; color: #212529;"><strong th:text="${loginTime}">01 Jan 2026, 10:00 AM</strong></td>
                </tr>
                <tr>
                    <td style="color: #495057;"><strong>System:</strong></td>
                    <td style="text-align: right; color: #212529;"><strong>EMILoan Web Portal</strong></td>
                </tr>
            </table>

            <div style="text-align: center; margin: 30px 0;">
                <a href="#" style="background-color: #17a2b8; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px;">Go to Dashboard</a>
            </div>

            <p>Best Regards,<br><strong>EMILoan Security Team</strong></p>
        </td>
    </tr>
</table>
</body>
</html>
